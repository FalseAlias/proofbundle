<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ProofBundle</title>
  <style>
    :root { color-scheme: light dark; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #f6f7f9; color: #15181f; line-height: 1.5; }
    main { max-width: 760px; margin: 0 auto; padding: 40px 18px 56px; }
    h1 { margin: 0 0 10px; font-size: clamp(2rem, 5vw, 3rem); line-height: 1.05; }
    .panel { margin-top: 18px; border: 1px solid #c8d0dc; border-radius: 8px; background: #fff; padding: 16px; }
    a.button { display: inline-block; margin-top: 12px; padding: 10px 14px; border-radius: 6px; background: #174ea6; color: #fff; text-decoration: none; }

    code { font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace; }
    @media (prefers-color-scheme: dark) {
      body { background: #111827; color: #e8edf2; }
      .panel { background: #172033; border-color: #314158; }
      a { color: #8ab4ff; }
      a.button { background: #8ab4ff; color: #09111f; }
    }
  </style>

<body>
  <main>
    <h1>ProofBundle</h1>
    <p>A local browser verifier for sealed JSON evidence bundles.</p>
    <section class="panel">
      <h2>Open The App</h2>
      <p>The verifier runs in your browser. Files stay local.</p>
      <a class="button" href="web/proofbundle_v1_1_app.html">Launch v1.1</a>
      <a style="margin-left:8px;display:inline-block;margin-top:12px;padding:10px 14px;border-radius:6px;border:1px solid currentColor;text-decoration:none;color:inherit;opacity:0.6" href="web/proofbundle_v1_0_app.html">v1.0</a>
    </section>
  </main>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ProofBundle Verifier</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      margin: 0;
      background: #f6f7f9;
      color: #15181f;
      line-height: 1.5;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 18px 56px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.05;
    }
    .panel {
      margin-top: 18px;
      border: 1px solid #c8d0dc;
      border-radius: 8px;
      background: #fff;
      padding: 16px;
    }
    input, button {
      font: inherit;
    }
    button {
      margin-top: 12px;
      padding: 10px 14px;
      border: 0;
      border-radius: 6px;
      background: #174ea6;
      color: #fff;
      cursor: pointer;
    }
    pre {
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      background: #111827;
      color: #e8edf2;
      border-radius: 8px;
      padding: 12px;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: #111827;
        color: #e8edf2;
      }
      .panel {
        background: #172033;
        border-color: #314158;
      }
      button {
        background: #8ab4ff;
        color: #09111f;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>ProofBundle Verifier</h1>
    <p>
      Local browser check for a ProofBundle JSON file. Nothing is uploaded.
    </p>

    <section class="panel">
      <label for="file">Choose a ProofBundle JSON file</label><br>
      <input id="file" type="file" accept="application/json,.json">
      <br>
      <button id="verify" type="button">Verify Shape And Hash</button>
    </section>

    <section class="panel">
      <h2>Result</h2>
      <pre id="result">No file selected.</pre>
    </section>
  </main>

  <script>
    const requiredTopLevelKeys = ["hdr", "payload", "meta", "refs", "seal"];
    const fileInput = document.getElementById("file");
    const result = document.getElementById("result");
    const verifyButton = document.getElementById("verify");

    function toHex(buffer) {
      return [...new Uint8Array(buffer)]
        .map((byte) => byte.toString(16).padStart(2, "0"))
        .join("");
    }

    function stableJson(value) {
      if (value === null || typeof value !== "object") return JSON.stringify(value);
      if (Array.isArray(value)) return `[${value.map(stableJson).join(",")}]`;
      return `{${Object.keys(value).sort().map((key) => `${JSON.stringify(key)}:${stableJson(value[key])}`).join(",")}}`;
    }

    async function verifySelectedFile() {
      const file = fileInput.files && fileInput.files[0];
      if (!file) {
        result.textContent = "No file selected.";
        return;
      }

      const bytes = await file.arrayBuffer();
      const text = new TextDecoder("utf-8", { fatal: false }).decode(bytes);
      const fileHash = toHex(await crypto.subtle.digest("SHA-256", bytes));

      let parsed;
      try {
        parsed = JSON.parse(text);
      } catch (error) {
        result.textContent = JSON.stringify({
          status: "failed",
          reason: "invalid_json",
          file_name: file.name,
          byte_count: bytes.byteLength,
          sha256: fileHash
        }, null, 2);
        return;
      }

      const keys = Object.keys(parsed).sort();
      const missing = requiredTopLevelKeys.filter((key) => !Object.prototype.hasOwnProperty.call(parsed, key));
      const extra = keys.filter((key) => !requiredTopLevelKeys.includes(key));
      const canonicalBytes = new TextEncoder().encode(stableJson(parsed));
      const canonicalHash = toHex(await crypto.subtle.digest("SHA-256", canonicalBytes));

      result.textContent = JSON.stringify({
        status: missing.length === 0 && extra.length === 0 ? "pass" : "warning",
        file_name: file.name,
        byte_count: bytes.byteLength,
        sha256: fileHash,
        canonical_shape_sha256: canonicalHash,
        observed_top_level_keys: keys,
        missing_top_level_keys: missing,
        extra_top_level_keys: extra
      }, null, 2);
    }

    verifyButton.addEventListener("click", () => {
      verifySelectedFile().catch((error) => {
        result.textContent = JSON.stringify({
          status: "failed",
          reason: "runtime_error",
          message: String(error && error.message ? error.message : error)
        }, null, 2);
      });
    });
  </script>
</body>
</html>

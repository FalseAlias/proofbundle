name: Proofbench

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

jobs:
  conformance-typescript-current:
    name: TypeScript current implementation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: implementations/typescript-core-20260516
        run: npm ci
      - name: Build
        working-directory: implementations/typescript-core-20260516
        run: npm run build
      - name: Run 300-vector conformance tests
        working-directory: implementations/typescript-core-20260516
        run: npm test

  static-browser-check:
    name: Static browser artifact check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run static browser tests
        run: node tests/proofbundle_app_static.test.mjs

  conformance-python-current:
    name: Python current implementation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python package and test dependencies
        run: python -m pip install -e "python[dev]"
      - name: Run Python conformance tests
        run: python -m pytest python/tests/test_conformance.py -v

  conformance-go-current:
    name: Go current implementation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run Go tests
        working-directory: implementations/go-core-20260516
        run: go test -v ./...
